name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install with vendored CMS packages
        run: |
          npm pkg set "overrides.@chester-hill-solutions/cms-core=file:vendor/chs-cms/cms-core"
          npm pkg set "overrides.@chester-hill-solutions/cms-server=file:vendor/chs-cms/cms-server"
          npm pkg set "overrides.@chester-hill-solutions/cms-react=file:vendor/chs-cms/cms-react"
          npm pkg set "overrides.@chester-hill-solutions/cms-agent=file:vendor/chs-cms/cms-agent"
          npm pkg set "overrides.@chester-hill-solutions/cms-setup=file:vendor/chs-cms/cms-setup"
          npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
