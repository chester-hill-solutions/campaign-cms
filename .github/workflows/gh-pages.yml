name: Deploy GitHub Pages demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout CMS monorepo
        uses: actions/checkout@v4
        with:
          repository: chester-hill-solutions/chester-hill-solutions
          path: vendor/chs-monorepo

      - uses: oven-sh/setup-bun@v2

      - name: Build CMS packages
        working-directory: vendor/chs-monorepo
        run: bun install && bun run build:cms

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install with built CMS packages
        run: |
          npm pkg set "overrides.@chester-hill-solutions/cms-core=file:vendor/chs-monorepo/packages/cms-core"
          npm pkg set "overrides.@chester-hill-solutions/cms-react=file:vendor/chs-monorepo/packages/cms-react"
          npm install

      - name: Build static demo
        run: VITE_BASE=/campaign-cms/ npm run build -w campaign-cms-gh-pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/gh-pages/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
