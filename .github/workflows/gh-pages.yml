name: Deploy GitHub Pages demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-cms:
    uses: chester-hill-solutions/chester-hill-solutions/.github/workflows/build-cms-artifact.yml@main
    secrets: inherit

  build:
    needs: build-cms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: chs-cms-packages
          path: vendor/chs-cms

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install with built CMS packages
        run: |
          npm pkg set "overrides.@chester-hill-solutions/cms-core=file:vendor/chs-cms/cms-core"
          npm pkg set "overrides.@chester-hill-solutions/cms-react=file:vendor/chs-cms/cms-react"
          npm install

      - name: Build static demo
        run: VITE_BASE=/campaign-cms/ npm run build -w campaign-cms-gh-pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/gh-pages/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
